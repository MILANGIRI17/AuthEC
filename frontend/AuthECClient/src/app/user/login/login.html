<div class="mb-4">
  <h2 class="text-success">Sign in</h2>
  <div>
    Don't have an account?
    <a routerLink="/signup" class="text-decoration-none fw-medium text-success d-inline-block"
      >Sign up</a
    >
  </div>
</div>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <input formControlName="email" class="form-control bg-body-secondary" placeholder="Email" />
    @if (hasDisplayableError('email') && form.controls.email.hasError('required')) {
      <div class="error-feedback">Please enter your email address</div>
    }
  </div>
  <div class="mb-3">
    <input
      type="password"
      formControlName="password"
      class="form-control bg-body-secondary"
      placeholder="Password"
    />
    @if (hasDisplayableError('password') && form.controls.password.hasError('required')) {
      <div class="error-feedback">Please enter your password</div>
    }
  </div>

  <div class="mt-4">
    <button type="submit" class="btn btn-success w-100 rounded-3">Sign in</button>
  </div>
</form>
