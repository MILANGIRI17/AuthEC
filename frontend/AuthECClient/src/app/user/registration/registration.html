<div class="mb-4 h2 text-success">
    Sign Up
</div>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
        <input formControlName="fullName" class="form-control bg-body-secondary" placeholder="Full Name"/>
    </div>
     <div class="mb-3">
        <input formControlName="email" type="text" class="form-control bg-body-secondary" placeholder="Email"/>
    </div>
     <div class="mb-3">
        <input formControlName="password" type="password" class="form-control bg-body-secondary" placeholder="password"/>
    </div>
     <div class="mb-3">
        <input formControlName="confirmPassword" type="password" class="form-control bg-body-secondary" placeholder="Confirm Password"/>
    </div>
    <div class="mt-4">
        <button type="submit" class="btn btn-success w-100 rounded-3">Register</button>
    </div>
</form>
